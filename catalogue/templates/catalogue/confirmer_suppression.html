<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Confirmer suppression</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #083a4f;
        min-height: 100vh;
        font-family: "Inter", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }
      .card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(165, 141, 102, 0.25);
        border-radius: 20px;
        padding: 52px 48px;
        width: 100%;
        max-width: 480px;
        text-align: center;
      }
      .icon {
        width: 64px;
        height: 64px;
        background: rgba(165, 141, 102, 0.1);
        border: 1px solid rgba(165, 141, 102, 0.3);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        margin: 0 auto 28px;
      }
      .tag {
        display: inline-block;
        background: rgba(165, 141, 102, 0.12);
        color: #a58d66;
        border: 1px solid rgba(165, 141, 102, 0.3);
        border-radius: 5px;
        padding: 4px 12px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-bottom: 16px;
      }
      h1 {
        font-family: "Playfair Display", serif;
        font-size: 26px;
        font-weight: 700;
        color: #e5e1dd;
        letter-spacing: -0.01em;
        margin-bottom: 16px;
        line-height: 1.2;
      }
      .tache-name {
        font-family: "Playfair Display", serif;
        font-style: italic;
        color: #a58d66;
      }
      p {
        color: rgba(192, 213, 214, 0.5);
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 40px;
      }
      .divider {
        height: 1px;
        background: rgba(165, 141, 102, 0.15);
        margin-bottom: 32px;
      }
      .actions {
        display: flex;
        gap: 12px;
      }
      .btn-confirm {
        flex: 1;
        background: rgba(165, 141, 102, 0.15);
        color: #a58d66;
        border: 1px solid rgba(165, 141, 102, 0.4);
        border-radius: 10px;
        padding: 15px;
        font-size: 13px;
        font-weight: 600;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        transition:
          background 0.2s,
          border-color 0.2s;
      }
      .btn-confirm:hover {
        background: rgba(165, 141, 102, 0.25);
        border-color: #a58d66;
      }
      .btn-cancel {
        flex: 1;
        background: #a58d66;
        color: #083a4f;
        border: none;
        border-radius: 10px;
        padding: 15px;
        font-size: 13px;
        font-weight: 600;
        font-family: "Inter", sans-serif;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        transition: background 0.2s;
      }
      .btn-cancel:hover {
        background: #c0a57a;
        color: #083a4f;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">⚠️</div>
      <div class="tag">Suppression</div>
      <h1>Supprimer la <em class="tache-name">tâche</em> ?</h1>
      <p>
        Vous êtes sur le point de supprimer<br />
        <strong style="color: #e5e1dd">« {{ object.titre }} »</strong><br />
        Cette action est irréversible.
      </p>
      <div class="divider"></div>
      <div class="actions">
        <form method="post" style="flex: 1">
          {% csrf_token %}
          <button type="submit" class="btn-confirm" style="width: 100%">
            Oui, supprimer
          </button>
        </form>
        <a href="{% url 'liste' %}" class="btn-cancel">Annuler</a>
      </div>
    </div>
  </body>
</html>
